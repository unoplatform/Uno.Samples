<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!--
    BrewHouse mark: a steaming coffee cup, drawn as a single cream-coloured silhouette
    (transparent background) so the adaptive-icon safe-zone / masking behaves and it
    reads at every size. Logo kept inside the inner ~60% safe zone.
  -->
  <g fill="none" stroke="#FDF6EE" stroke-width="12" stroke-linecap="round">
    <path d="M196,170 q-13,-16 0,-32 q13,-16 0,-32" />
    <path d="M228,176 q-13,-16 0,-32 q13,-16 0,-32" />
    <path d="M260,170 q-13,-16 0,-32 q13,-16 0,-32" />
  </g>
  <!-- saucer -->
  <ellipse cx="228" cy="324" rx="108" ry="15" fill="#FDF6EE" />
  <!-- handle -->
  <path d="M304,214 Q346,214 346,240 Q346,266 304,262"
        fill="none" stroke="#FDF6EE" stroke-width="16" stroke-linecap="round" />
  <!-- cup body -->
  <path d="M150,200 Q150,190 160,190 L296,190 Q306,190 306,200 L293,290 Q291,308 272,308 L184,308 Q165,308 163,290 Z"
        fill="#FDF6EE" />
</svg>
